version: "3.8"

services:
  # OCR Microservice - All OCR engines in one container
  # Note: On ARM64 (Apple Silicon), PaddleOCR may crash due to platform incompatibility.
  # For ARM64 deployment, use: ENABLED_ENGINES=easyocr,tesseract
  # For x86_64 deployment, use: ENABLED_ENGINES=easyocr,tesseract,paddle
  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENABLED_ENGINES=easyocr,tesseract,paddle
      - MAX_CONCURRENT_REQUESTS=3
      - GC_AFTER_REQUEST=true
    volumes:
      # Pip cache for faster rebuilds
      - ~/.cache/pip:/root/.cache/pip:rw
    # Memory limits: 4GB for all 3 engines pre-warmed
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s  # 5 min for model warmup
    restart: unless-stopped

  # OpenSerp microservice for image search
  openserp:
    image: karust/openserp:latest
    ports:
      - "127.0.0.1:7000:7000"
    command: serve -a 0.0.0.0 -p 7000
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Main vine-api application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OCR_SERVICE_URL=http://ocr-service:8000
      - OPENSERP_URL=http://openserp:7000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
    depends_on:
      ocr-service:
        condition: service_healthy
      openserp:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./data:/app/data

networks:
  default:
    name: vine-api-network
