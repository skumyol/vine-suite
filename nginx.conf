events {
    worker_connections 1024;
}

http {
    upstream vine2 {
        server localhost:5173;
    }
    upstream vine-studio {
        server localhost:3000;
    }
    upstream vine-rec {
        server localhost:3001;
    }

    server {
        listen 80;

        location /vine2/ {
            proxy_pass http://vine2/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /studio/ {
            proxy_pass http://vine-studio/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /rec/ {
            proxy_pass http://vine-rec/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location / {
            return 200 'Vine Suite - Available endpoints:\n/vine2/ - AI Wine Analysis\n/studio/ - OCR Studio\n/rec/ - Wine Recommendations\n';
            add_header Content-Type text/plain;
        }
    }
}
