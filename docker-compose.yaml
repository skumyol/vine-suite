# Full production deployment for vine-api
# Replaces vine-rec on the server
# Includes all services: OCR (EasyOCR, Tesseract, Paddle), OpenSerp, API, Frontend
#
# Nginx mapping:
#   - /vine/api/ -> api:8002/api/
#   - /vine/health/ -> api:8002/health/
#   - /vine -> frontend:3001
#   - /ocr/ -> ocr-service:8003 (optional direct access)

services:
  # OCR Microservice - All OCR engines (EasyOCR, Tesseract, Paddle)
  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8003:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENABLED_ENGINES=easyocr,tesseract,paddle
      - MAX_CONCURRENT_REQUESTS=3
      - GC_AFTER_REQUEST=true
    volumes:
      - ~/.cache/pip:/root/.cache/pip:rw
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped
    networks:
      - vine-api-net

  # OpenSerp microservice for image search
  openserp:
    image: karust/openserp:latest
    ports:
      - "127.0.0.1:7000:7000"
    command: serve -a 0.0.0.0 -p 7000
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - vine-api-net

  # Main vine-api backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      - OCR_SERVICE_URL=http://ocr-service:8000
      - OPENSERP_URL=http://openserp:7000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - OCR_PROVIDER=easyocr
      - VLM_PROVIDER=gemini
      - SEARCH_PROVIDER=openserp
      - DEBUG=false
    depends_on:
      ocr-service:
        condition: service_healthy
      openserp:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    networks:
      - vine-api-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Next.js frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vine-api-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  vine-api-net:
    name: vine-api-network
